; ===== Xdebug 設定 (学習用) =====
; mode: debug=ステップ実行, develop=見やすいvar_dump等
xdebug.mode=debug,develop

; リクエストごとに毎回デバッガに接続を試みる (学習中はこれが楽)
; トリガー方式にしたい場合は trigger に変更し、XDEBUG_SESSION を付けて起動する
xdebug.start_with_request=yes

; コンテナからホスト(=VSCode/PhpStorm)へ繋ぎに行く
xdebug.client_host=host.docker.internal
xdebug.client_port=9003

; IDE 側の設定キー (任意。複数人/複数IDEのとき便利)
xdebug.idekey=VSCODE

; ログを出してトラブルシュートしやすくする (不要なら 0 に)
xdebug.log=/tmp/xdebug.log
xdebug.log_level=7
